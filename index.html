<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リキッ碁 / Liqui-go</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0e14;
        overflow: hidden;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      /* キャンバスは必ずコンテナ一杯に収める（drawing buffer サイズが CSS px として
         leak して盤が右下に寄るのを防ぐ保険。正は boardScene の setSize(w,h)）。 */
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        color: #cfe3ff;
        font:
          12px/1.5 ui-monospace,
          monospace;
        user-select: none;
        /* パネル背景はクリックを盤に通す。実際に操作するボタンだけ pointer-events を
           復活させ、HUD 領域が交点クリックを塞ぐ死角にならないようにする。 */
        pointer-events: none;
      }
      #hud-panel {
        background: rgba(10, 18, 28, 0.72);
        border: 1px solid #24405c;
        border-radius: 6px;
        padding: 8px 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 140px;
      }
      #hud .hud-row {
        display: flex;
        gap: 6px;
        align-items: center;
        min-height: 16px;
        flex-wrap: wrap;
      }
      /* hidden 属性で行を出し分けする（編集モードのブラシ行・対局コントロール行）。
         UA の [hidden]{display:none} は詳細度(0,0,0,1)で #hud .hud-row(0,1,0,1) に
         負けて効かない。ここで #hud .hud-row[hidden](0,1,0,2) を併記して確実に隠す
         （CLAUDE.md 規律: display:flex を hidden で制御するときは必ずこの規則を書く）。 */
      #hud .hud-row[hidden] {
        display: none;
      }
      #hud button {
        font: inherit;
        color: #cfe3ff;
        background: #17293b;
        border: 1px solid #2f5474;
        border-radius: 4px;
        padding: 3px 10px;
        cursor: pointer;
        pointer-events: auto; /* ボタンだけクリックを受ける（#hud は none） */
      }
      #hud button.active {
        background: #2f6fa0;
        border-color: #4f96c8;
        color: #eef6ff;
      }
      #hud-reject {
        color: #ff9a90;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
